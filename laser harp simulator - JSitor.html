<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Laser Harp Pro - Compact Sampler</title>
    <style>
        body { margin: 0; background: #020512; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; }
        #ui-container { position: absolute; bottom: 20px; left: 20px; z-index: 100; transition: transform 0.3s ease; }
        #ui-container.folded { transform: translateY(calc(100% - 40px)); }
        #ui-toggle { background: #0f0; color: #000; border: none; padding: 8px 15px; cursor: pointer; font-weight: bold; border-radius: 5px 5px 0 0; width: 100%; box-shadow: 0 0 10px rgba(0, 255, 0, 0.3); }
        #ui { background: rgba(0, 15, 40, 0.95); padding: 15px; border: 1px solid #0f0; color: white; font-size: 11px; display: grid; gap: 8px; border-radius: 0 0 5px 5px; }
        .row { display: flex; align-items: center; gap: 8px; border-bottom: 1px solid rgba(0, 255, 0, 0.1); padding-bottom: 4px; }
        input[type="file"] { width: 130px; font-size: 9px; color: #0f0; }
        select { background: #000; color: #0f0; border: 1px solid #0f0; font-size: 10px; }
        #msg { position: absolute; width: 100%; text-align: center; top: 20px; color: #0f0; pointer-events: none; text-shadow: 0 0 10px #0f0; font-family: monospace; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div id="msg">SYSTEM READY / CLICK TO START</div>
    <div id="ui-container" class="folded">
        <button id="ui-toggle">PANEL (OPEN/CLOSE)</button>
        <div id="ui"></div>
    </div>
    <canvas id="harp"></canvas>
    <!-- ここで script.js を読み込む -->
    <script src="script.js"></script>
</body>
</html>
